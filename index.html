<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna auf Rollschuhen – Das große Abenteuer</title>
    <style>
        /* Grunddesign & Farbpalette (Modernes, fröhliches Neon-Skater-Design im Dark Mode) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121214;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Spiel-Container */
        .game-container {
            width: 100%;
            max-width: 650px;
            background: #1e1e24;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 0, 128, 0.2);
            padding: 35px;
            text-align: center;
            border: 2px solid #ff007f;
            transition: all 0.3s ease;
        }

        /* Titel */
        h1 {
            font-size: 24pt;
            color: #00f0ff;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            font-weight: 700;
        }

        /* Story-Text-Box */
        .story-text {
            font-size: 13pt;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e2e2e9;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #ff007f;
        }

        /* Container für die Buttons */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Buttons allgemein */
        .btn {
            background: #2a2a35;
            color: #ffffff;
            border: 2px solid #00f0ff;
            padding: 14px 20px;
            font-size: 11pt;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            width: 100%;
        }

        /* Button Hover-Effekt */
        .btn:hover {
            background: #00f0ff;
            color: #121214;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }

        /* Spezieller "Erneut spielen"-Button für das Ende */
        .btn-restart {
            border-color: #ff007f;
            background: rgba(255, 0, 128, 0.1);
        }

        .btn-restart:hover {
            background: #ff007f;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.6);
        }

        /* Fortschrittsanzeige */
        .progress-bar {
            font-size: 9pt;
            color: #8a8a93;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Animation für Textübergänge */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Luna auf Rollschuhen</h1>
        <div id="story" class="story-text fade-in"></div>
        <div id="choices" class="choices-container"></div>
        <div id="progress" class="progress-bar"></div>
    </div>

    <script>
        // Die Spiel-Logik und alle Pfade der Geschichte
        const storyNodes = {
            start: {
                text: "Luna möchte unbedingt auf Rollschuhen tanzen und bei den großen Wettbewerben mitmachen! Zu zweit – als Junge und Mädchen – muss man eine Choreographie tanzen und dabei den Song singen. Ein Traum!<br><br>Luna geht zur Rollschuhbahn und versucht ein bisschen zu tanzen, doch es klappt nicht so gut. Plötzlich kommt Amba auf die Bahn: 'Hey, ich bin Amba. Mach Platz, du bist viel zu schlecht für die Bahn!'<br><br>Da kommt Lunas bester Freund Simon: 'Luna darf auch hier skaten!' Amba schnaubt nur. Luna übt in einer Ecke weiter. Mist, schon wieder hingefallen! Simon lacht aufmunternd: 'Ach komm, ich lade dich zu einem bunten Cocktail ein!'<br><br>'Okay, ich komme!', ruft Luna und rollt hinter ihm her. Beim Cocktail trinken schmieden die beiden einen Plan. Was schlägst du vor?",
                choices: [
                    { text: "Heimlich nachts auf der Bahn trainieren, wenn Amba nicht da ist.", target: "heimlich_trainieren" },
                    { text: "Direkt für den großen Open-Air-Wettbewerb nächste Woche anmelden.", target: "direkt_anmelden" },
                    { text: "Einen Profi-Trainer suchen, der ihnen hilft.", target: "trainer_suchen" }
                ]
            },
            heimlich_trainieren: {
                text: "Gute Idee! Luna und Simon schleichen sich abends auf die glitzernde Rollschuhbahn. Niemand ist da, das Flutlicht wirft bunte Schatten. Sie fangen an zu singen und die Schritte zu üben. Es klappt immer besser!<br><br>Doch am dritten Abend steht plötzlich Amba im Schatten und verschränkt die Arme: 'Was macht ihr denn hier? Ihr klaut meine Trainingszeit! Verschwindet, oder ich sorge dafür, dass ihr von der Bahn fliegt!'",
                choices: [
                    { text: "Mutig sein und Amba zu einem spontanen Vor-Duell herausfordern.", target: "vor_duell" },
                    { text: "Lieber nachgeben und im Park auf dem holprigen Asphalt weiterüben.", target: "park_ueben" }
                ]
            },
            direkt_anmelden: {
                text: "Ihr meldet euch mutig an! Auf der Liste seht ihr, dass Amba und ihr Partner auch teilnehmen. Als Amba davon erfährt, lacht sie Luna laut aus: 'Ihr wollt antreten? Ihr habt ja nicht mal eine fertige Choreographie!'<br><br>Die Nervosität steigt. Ihr habt nur noch drei Tage Zeit. Wie nutzt ihr die wertvolle Zeit?",
                choices: [
                    { text: "Tag und Nacht ohne Pause durchpowern und die Schritte erzwingen.", target: "durchpowern" },
                    { text: "Erstmal den Song perfekt einsingen, damit die Musik sicher sitzt.", target: "song_ueben" }
                ]
            },
            trainer_suchen: {
                text: "Ihr fragt Tino, den netten Besitzer der Saftbar, der früher selbst einmal Rollschuh-Meister war. Er lächelt: 'Ich helfe euch! Aber ihr müsst genau auf mein Rhythmus-Gefühl hören.'<br><br>Tino zeigt Luna und Simon, wie man beim Singen das Gleichgewicht hält. Amba sieht das von weitem und wird eifersüchtig. Am nächsten Tag sind Lunas Rollschuhe plötzlich spurlos verschwunden! Amba muss sie versteckt haben.",
                choices: [
                    { text: "Überall nach den Rollschuhen suchen und die Zeit verlieren.", target: "suchen_zeit_verlieren" },
                    { text: "Simon fragen, ob er schnell seine alten Ersatz-Skates leihen kann.", target: "ersatz_skates" }
                ]
            },
            vor_duell: {
                text: "Luna nimmt allen Mut zusammen: 'Wenn wir so schlecht sind, dann zeig uns, was du kannst!' Sie schalten die Musik an. Luna und Simon tanzen und singen ihre erste Strophe. Es ist nicht perfekt, aber voller Energie!<br><br>Amba ist so überrascht von Lunas Selbstbewusstsein, dass sie beim Vorführen ihrer eigenen Drehung stolpert. Amba merkt, dass Luna eine echte Gegnerin wird und zieht wütend ab. Das gibt Luna einen riesigen Motivationsschub für das echte Finale!",
                choices: [
                    { text: "Weiter zum großen Finale!", target: "ende_super_sieg" }
                ]
            },
            park_ueben: {
                text: "Ihr weicht in den Park aus. Der Asphalt ist rau und hat viele kleine Steinchen. Es ist super anstrengend und Luna fällt oft hin. Aber Simon hält immer ihre Hand und fängt sie auf.<br><br>Durch den schwierigen Boden werden Lunas Muskeln und ihre Balance blitzschnell viel besser. Als der Tag des Wettbewerbs kommt, fühlt sich die glatte Profi-Bahn für Luna plötzlich federleicht an!",
                choices: [
                    { text: "Ab auf die Bühne!", target: "ende_ueberraschung" }
                ]
            },
            durchpowern: {
                text: "Ihr trainiert viel zu hart ohne Pausen. Lunas Füße tun weh und Simon ist total heiser vom vielen Singen. Am Tag des Wettbewerbs sind beide völlig erschöpft.<br><br>Bei der ersten großen Drehung verpassen sie den Takt des Songs und Luna rutscht aus. Amba gewinnt den Pokal und lächelt fies. Aber Simon flüstert Luna zu: 'Kopf hoch, nächstes Mal machen wir Pausen!'",
                choices: [
                    { text: "Schade... Noch einmal versuchen?", target: "start" }
                ],
                isEnd: true
            },
            song_ueben: {
                text: "Ihr konzentriert euch voll auf den Gesang. Eure Stimmen harmonieren wunderschön! Weil die Musik so perfekt im Kopf sitzt, laufen die Rollschuh-Schritte am Turniertag wie von selbst.<br><br>Das Publikum ist begeistert von eurem zweistimmigen Gesang. Amba tanzt zwar technisch perfekt, wirkt aber total kalt. Die Jury liebt euer Gefühl!",
                choices: [
                    { text: "Zur Siegerehrung!", target: "ende_knapp" }
                ]
            },
            suchen_zeit_verlieren: {
                text: "Ihr sucht den ganzen Nachmittag. Gefunden habt ihr sie in einer Mülltonne hinter der Halle – völlig verstaubt. Doch das Training ist für heute ausgefallen und morgen ist schon der Wettbewerb.<br><br>Ohne die nötige Übung klappt die Hebefigur nicht und ihr belegt leider nur den letzten Platz. Amba feiert ihren Sieg, aber Luna schwört sich: Ich gebe niemals auf!",
                choices: [
                    { text: "Neuer Anlauf!", target: "start" }
                ],
                isEnd: true
            },
            ersatz_skates: {
                text: "Keine Zeit verlieren! Simon flitzt los und holt seine alten, bunten Ersatz-Rollschuhe. Sie sind Luna zwar ein kleines bisschen zu groß, aber mit dicken Socken klappt es! Tino trainiert euch die letzten Stunden knallhart.<br><br>Beim Wettbewerb glänzen Lunas Augen. Die Choreographie sitszt, der Song klingt fantastisch!",
                choices: [
                    { text: "Wie entscheidet die Jury?", target: "ende_super_sieg" }
                ]
            },
            // Die verschiedenen Enden
            ende_super_sieg: {
                text: "🏆 <b>DAS GOLDENE ENDE: Der Riesenerfolg!</b><br><br>Luna und Simon betreten die Bahn. Sie wirbeln im perfekten Gleichklang herum, halten sich an den Händen und singen den Song so fehlerfrei und schön, dass das Publikum Gänsehaut bekommt. Sogar Amba klatscht mit offenem Mund.<br><br>Die Jury vergibt die Höchstpunktzahl: Platz 1 für Luna und Simon! Lunas großer Traum ist wahr geworden und sie hält stolz den glitzernden Pokal in den Händen. Sie hat trotz aller Schwierigkeiten niemals aufgegeben!",
                choices: [
                    { text: "🎉 Nochmal spielen und andere Wege entdecken!", target: "start" }
                ],
                isEnd: true
            },
            ende_ueberraschung: {
                text: "✨ <b>DAS ÜBERRASCHENDE ENDE: Die Publikumslieblinge!</b><br><br>Weil Luna auf dem harten Parkboden so viel Kraft trainiert hat, fliegt sie nun regelrecht über die Profi-Bahn! Sie baut spontan einen spektakulären Sprung ein, den niemand erwartet hat. Der Song klingt mutig und kraftvoll.<br><br>Amba gewinnt zwar knapp den Jury-Pokal, aber das gesamte Publikum jubelt nur für Luna und Simon! Ein berühmter Sport-Fotograf rennt zu Luna: 'Du bist der Star des Tages! Darf ich dich für ein Skater-Magazin interviewen?' Luna strahlt – das ist viel besser als jeder Pokal!",
                choices: [
                    { text: "✨ Das war toll! Gleich nochmal spielen!", target: "start" }
                ],
                isEnd: true
            },
            ende_knapp: {
                text: "🥈 <b>DAS GUTE ENDE: Silber mit Herz!</b><br><br>Euer Gesang war der absolute Hammer! Jeder Ton hat gesessen. Amba hatte zwar die perfekteren Profi-Sprünge, aber die Herzen der Zuschauer gehören euch.<br><br>Ihr holt den wohlverdienten 2. Platz! Amba guckt ganz schön grimmig, weil alle Luna für ihren wunderschönen Gesang loben. Simon und Luna trinken danach einen Riesen-Sieger-Cocktail und wissen: Nächstes Jahr holen wir uns Gold!",
                choices: [
                    { text: "🥳 Super! Direkt nochmal spielen!", target: "start" }
                ],
                isEnd: true
            }
        };

        // Zustand des Spiels
        let currentNode = "start";

        // Funktion zum Anzeigen einer Passage
        function renderNode(nodeKey) {
            currentNode = nodeKey;
            const node = storyNodes[nodeKey];
            
            const storyElement = document.getElementById("story");
            const choicesElement = document.getElementById("choices");
            const progressElement = document.getElementById("progress");

            // Animation zurücksetzen für den neuen Text
            storyElement.classList.remove("fade-in");
            void storyElement.offsetWidth; // Trick, um die Animation neu zu starten
            storyElement.classList.add("fade-in");

            // Text setzen
            storyElement.innerHTML = node.text;

            // Buttons leeren
            choicesElement.innerHTML = "";

            // Neue Buttons erstellen
            node.choices.forEach(choice => {
                const button = document.createElement("button");
                button.innerHTML = choice.text;
                button.classList.add("btn");
                
                // Wenn es ein Neustart-Button am Ende ist, extra Style verpassen
                if (node.isEnd) {
                    button.classList.add("btn-restart");
                }

                button.onclick = () => renderNode(choice.target);
                choicesElement.appendChild(button);
            });

            // Fortschritts-/Statusanzeige aktualisieren
            if (node.isEnd) {
                progressElement.innerHTML = "✨ Ende der Geschichte ✨";
            } else {
                progressElement.innerHTML = "Deine Entscheidungen bestimmen Lunas Weg...";
            }
        }

        // Das Spiel starten, wenn die Seite geladen wird
        window.onload = function() {
            renderNode("start");
        };
    </script>
</body>
</html>
